info:
  name: Add Question to Quiz
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:8080/question
  body:
    type: json
    data: |-
      {
        "quizId": "80297731-fe93-4838-8b76-5ae7b98e4a3a",
        "text": "What strategy of conflict resolution is applied heavily in Landau?",
        "options": [
          {
            "text": "Public Humiliation",
            "correct": false
          }
        ]
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
