spring:
  profiles:
    # Default boot runs as prod. Demo seeders (e.g. SamplerSeeder) gate
    # themselves with !prod so a freshly deployed instance doesn't ship
    # fixture content. Override locally with
    # `SPRING_PROFILES_ACTIVE=local ./gradlew bootRun` to seed the demo
    # sampler user + quizzes for the e2e suite.
    default: prod
  jpa:
    open-in-view: false
  session:
    store-type: jdbc
    jdbc:
      initialize-schema: never
  application:
    name: my-app
  web:
    error:
      include-stacktrace: never
      include-message: never
      include-binding-errors: never
      include-exception: false
      whitelabel:
        enabled: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: ${DATABASE_URL:jdbc:mariadb://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:main}}
    username: ${DATABASE_USERNAME:user}
    password: ${DATABASE_PASSWORD:password}
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/main.yaml

app:
  uploads:
    dir: ${APP_UPLOADS_DIR:./uploads}

server:
  servlet:
    session:
      cookie:
        http-only: true
        # Default false so plain-HTTP prod deployments work out of the box.
        # Override with SERVER_SESSION_COOKIE_SECURE=true behind HTTPS.
        secure: ${SERVER_SESSION_COOKIE_SECURE:false}
        same-site: ${SERVER_SESSION_COOKIE_SAME_SITE:lax}
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    csrf:
      enabled: true