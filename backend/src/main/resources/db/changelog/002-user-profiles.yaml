databaseChangeLog:
  - changeSet:
      id: backfill-display-name-from-username
      author: hubenko
      changes:
        - sql:
            sql: UPDATE users SET display_name = username WHERE display_name IS NULL OR display_name = ''
            stripComments: true

  - changeSet:
      id: add-avatar-path-to-users
      author: hubenko
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: avatar_path
                  type: VARCHAR(255)
                  remarks: Relative path under the configured uploads dir, or NULL when no avatar is set

  - changeSet:
      id: add-bio-to-users
      author: hubenko
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: bio
                  type: VARCHAR(280)
                  remarks: Short free-text profile description
