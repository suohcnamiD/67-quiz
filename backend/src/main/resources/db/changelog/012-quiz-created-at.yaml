databaseChangeLog:
  - changeSet:
      id: add-quiz-created-at
      author: hubenko
      changes:
        - addColumn:
            tableName: quizzes
            columns:
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
                  remarks: When the quiz was created. Set to CURRENT_TIMESTAMP for existing rows on migration so sorts don't break.
        - createIndex:
            indexName: quizzes_created_at_ix
            tableName: quizzes
            columns:
              - column:
                  name: created_at
